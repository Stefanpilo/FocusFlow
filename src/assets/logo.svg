<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="54 42 148 168" width="256" height="256" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">


  <defs>
    <!-- Soft drop shadow in header gray (#3f4160) -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#3f4160" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Tomato body — slightly wider than tall -->
    <ellipse cx="128" cy="140" rx="68" ry="64" fill="#FFFFFF"/>

    <!-- Stem — short vertical line -->
    <line x1="128" y1="78" x2="128" y2="50" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>

    <!-- Single larger leaf curving to the right -->
    <path d="M126 75 Q162 48 164 66 Q154 90 126 82 Z" fill="#FFFFFF"/>
  </g>

</svg>
